<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css" >

  <title>Frontend Mentor | Product preview card component</title>

</head>
<body>
  <main>
    <section>
      <picture>
        <source srcset="images/image-product-mobile.jpg" media="(max-width: 40rem)"/>
        <img src="images/image-product-desktop.jpg" alt="Channel purfume bottle"/>

      </picture>
      <div class="product-details">
        <p class="type">Perfume</p>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, 
  Perfumer-Creator for the House of CHANEL.</p>
        <div class="price-container">
          <p class="price">$149.99</p>
          <p class="rrp">$169.99</p>
        </div>
        <button><img src="images/icon-cart.svg" alt="shopping cart"> Add to Cart</button>
          
      </div>

    </section>
  </main>
  

</body>
</html>
